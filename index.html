<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buffy's Research Hub 🍔</title>
<style>
  :root {
    --bg: #FAF8F5;
    --card-bg: #FFFFFF;
    --text: #2D3436;
    --text-secondary: #636E72;
    --accent: #7D8C6E;
    --accent-light: #A8B89A;
    --border: #E8E4DF;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --tag-bg: #F0EDE8;
  }
  [data-theme="dark"] {
    --bg: #1A1D21;
    --card-bg: #23272E;
    --text: #E8E4DF;
    --text-secondary: #9BA3AB;
    --accent: #A8B89A;
    --accent-light: #7D8C6E;
    --border: #333840;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --tag-bg: #2C3138;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-secondary);
    font-size: 1.05rem;
    line-height: 1.6;
  }
  .theme-toggle {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
  }
  .theme-toggle:hover { transform: scale(1.1); }

  /* Section */
  .section-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Report Cards */
  .report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .report-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .report-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  }
  .report-card .ticker {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .report-card h3 {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .report-card .desc {
    color: var(--text-secondary);
    font-size: 0.9rem;
    line-height: 1.5;
    flex: 1;
    margin-bottom: 12px;
  }
  .report-card .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .tag {
    display: inline-block;
    background: var(--tag-bg);
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .tag.buy { color: #7D8C6E; }
  .tag.hold { color: #8B7E6A; }
  .tag.sell { color: #B07070; }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 0.8rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

  <header>

  <div class="report-grid" id="reportGrid"></div>

  <footer>

  </footer>
</div>

/* ── RENDER (sort by modTime desc) ── */
function renderReports() {
  const grid = document.getElementById('reportGrid');
  reports.sort((a, b) => b.modTime - a.modTime);
  grid.innerHTML = reports.map(r => `
    <a class="report-card" href="${r.file}">
      <div class="ticker">${r.ticker}</div>
      <h3>${r.title}</h3>
      <div class="desc">${r.desc}</div>
      <div class="meta">
        <span class="tag ${r.tagClass}">${r.tag}</span>
        <span>${r.date}</span>
      </div>
    </a>
  `).join('');
}
renderReports();

/* ── THEME ── */
function toggleTheme() {
  const d = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (d.getAttribute('data-theme') === 'dark') {
    d.removeAttribute('data-theme');
    btn.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    d.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}
(function() {
  const t = localStorage.getItem('theme');
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('themeBtn').textContent = '☀️';
    });
  }
})();
</script>

</html>
